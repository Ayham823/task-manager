name: Django CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: task_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run migrations
      run: python manage.py migrate
      env:
        CI: true

    - name: Run tests
      run: python manage.py test

    - name: Build Docker image
      run: docker build -t task-manager .

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Docker image
      run: docker tag task-manager ${{ secrets.DOCKER_USERNAME }}/task-manager:latest

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/task-manager:latest

    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
          docker pull ${{ secrets.DOCKER_USERNAME }}/task-manager:latest &&
          docker stop web || true &&
          docker rm web || true &&
          docker run -d \
            --name web \
            --link db \
            -p 8000:8000 \
            ${{ secrets.DOCKER_USERNAME }}/task-manager:latest
        "